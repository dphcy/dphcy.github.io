  abstract: "In this paper, we investigate the future probabilities and concerns of areas with high CVE rates, which have been found to be positively correlated with the white race and higher degree of education. We implement stochastic block modeling, rather than risk models, in order to predict future outbreaks in susceptible regions of Texas. Furthermore, we will implement the usage of SIR models and graph theory to investigate the outbreak patterns of various diseases. All of this will be done with R"
