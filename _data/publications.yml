- title: "Comparative Analysis of Haplotype Assembly Algorithms"
  authors: Shuying Sun, Flora Cheng, Daphne Han, Sarah Wei, and Alice Zhong
  year: 2020
  type: conference
  venue: 2022 TXST Health Scholars, 2020 ICSA, 2020 TXST Graduate Expo
  image: ../assets/images/bodies_uncovered.jpg
  id: sunchenghanweizhong2020comparativeHA
  projectpage: https://posterpresentations.wp.txstate.edu/home/mathematics/sun/
  abstract: "Haplotype information is useful for studying genetic variation, which can then be used to determine trait or disease association in a population. Haplotype assembly is a useful way that enables us to interpret genetic variations and its impacts. In this paper, we will be comparing various haplotype assembly algorithms to assess the advantages and disadvantages of each. We will do this by running multiple algorithms across a multitude of datasets to compare their accuracy and efficiency, as well as other algorithmic components. This comparison analysis is important because each algorithm has its own benefits and drawbacks, and it is necessary to compare all of them in order to develop more accurate algorithms in the future."

